<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 720" font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace">
  <defs>
    <radialGradient id="termGlow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#0d0e1a"/>
    </radialGradient>
    <linearGradient id="titleBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a2b3d"/>
      <stop offset="100%" style="stop-color:#1e1f2e"/>
    </linearGradient>
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
    <filter id="terminalShadow">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Terminal Window -->
  <rect x="20" y="20" width="980" height="680" rx="12" fill="url(#termGlow)" stroke="#3d3d5c" stroke-width="1.5" filter="url(#terminalShadow)"/>

  <!-- Title Bar -->
  <rect x="20" y="20" width="980" height="38" rx="12" fill="url(#titleBar)"/>
  <rect x="20" y="48" width="980" height="10" fill="url(#titleBar)"/>

  <!-- Window Buttons -->
  <circle cx="48" cy="39" r="6" fill="#ff5f56"/>
  <circle cx="68" cy="39" r="6" fill="#ffbd2e"/>
  <circle cx="88" cy="39" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="510" y="44" text-anchor="middle" fill="#a0a0c0" font-size="11">zsh — nosqlhunter — 80×24</text>

  <!-- Scan line effect -->
  <rect x="20" y="580" width="980" height="120" fill="url(#scanLine)"/>

  <!-- ==================== TERMINAL OUTPUT ==================== -->

  <!-- Line 1: Banner -->
  <rect x="35" y="72" width="950" height="26" rx="4" fill="#22c55e" opacity="0.06"/>
  <text x="50" y="90" fill="#22c55e" font-size="13" font-weight="700">NoSQL Injection Exploitation Framework v2.2 — Automated NoSQL Injection Testing Suite</text>

  <!-- Line 2: Separator -->
  <text x="50" y="112" fill="#3d3d5c" font-size="12">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <!-- Line 3: Target -->
  <text x="50" y="134" fill="#89dceb" font-size="12">►</text>
  <text x="68" y="134" fill="#cdd6f4" font-size="12"> Target:</text>
  <text x="118" y="134" fill="#a6e3a1" font-size="12">http://target.com/api</text>

  <!-- Line 4: Start -->
  <text x="50" y="154" fill="#89dceb" font-size="12">►</text>
  <text x="68" y="154" fill="#cdd6f4" font-size="12"> Initializing scan engine...</text>

  <!-- Line 5: Loading dataset -->
  <text x="50" y="174" fill="#89dceb" font-size="12">►</text>
  <text x="68" y="174" fill="#cdd6f4" font-size="12"> Loading payload dataset...</text>

  <!-- Spinner animation -->
  <text x="50" y="194" fill="#89dceb" font-size="12">⡿</text>
  <text x="68" y="194" fill="#cdd6f4" font-size="12"> Loading payloads from: dataset/dataset_nosql.json</text>

  <text x="50" y="214" fill="#a6e3a1" font-size="12">✔</text>
  <text x="68" y="214" fill="#a6e3a1" font-size="12" filter="url(#glowGreen)"> Loaded 6,432 payloads</text>
  <text x="262" y="214" fill="#585b70" font-size="11">across 53 attack categories in 4.2s</text>

  <!-- Line 8: Spider Phase -->
  <text x="50" y="240" fill="#89dceb" font-size="12">►</text>
  <text x="68" y="240" fill="#cdd6f4" font-size="12"> Phase 1:</text>
  <text x="122" y="240" fill="#f5c2e7" font-size="12">Hellhound-Spider</text>
  <text x="240" y="240" fill="#cdd6f4" font-size="12"> endpoint discovery — depth=3, concurrency=10</text>

  <!-- Spider progress bar -->
  <rect x="68" y="249" width="200" height="4" rx="2" fill="#313244"/>
  <rect x="68" y="249" width="200" height="4" rx="2" fill="#f5c2e7" opacity="0.8"/>

  <!-- Found endpoints list -->
  <text x="50" y="274" fill="#a6e3a1" font-size="12">✔</text>
  <text x="68" y="274" fill="#cdd6f4" font-size="12"> Discovered</text>
  <text x="138" y="274" fill="#f9e2af" font-size="12" font-weight="700">14</text>
  <text x="150" y="274" fill="#cdd6f4" font-size="12"> unique endpoints</text>

  <!-- Endpoint tags -->
  <rect x="310" y="264" width="80" height="20" rx="4" fill="#45475a" opacity="0.5"/>
  <text x="318" y="278" fill="#f5c2e7" font-size="9">/api/login</text>
  <rect x="395" y="264" width="88" height="20" rx="4" fill="#45475a" opacity="0.5"/>
  <text x="403" y="278" fill="#f5c2e7" font-size="9">/api/search</text>
  <rect x="488" y="264" width="80" height="20" rx="4" fill="#45475a" opacity="0.5"/>
  <text x="496" y="278" fill="#f5c2e7" font-size="9">/api/admin</text>
  <rect x="573" y="264" width="80" height="20" rx="4" fill="#45475a" opacity="0.5"/>
  <text x="581" y="278" fill="#f5c2e7" font-size="9">/api/data</text>
  <rect x="658" y="264" width="95" height="20" rx="4" fill="#45475a" opacity="0.5"/>
  <text x="666" y="278" fill="#f5c2e7" font-size="9">/api/config</text>
  <rect x="758" y="264" width="80" height="20" rx="4" fill="#45475a" opacity="0.5"/>
  <text x="766" y="278" fill="#f5c2e7" font-size="9">+9 more</text>

  <text x="50" y="298" fill="#a6e3a1" font-size="12">✔</text>
  <text x="68" y="298" fill="#cdd6f4" font-size="12"> Extracted</text>
  <text x="138" y="298" fill="#f9e2af" font-size="12" font-weight="700">38</text>
  <text x="150" y="298" fill="#cdd6f4" font-size="12"> total parameters across all endpoints</text>

  <!-- Separator -->
  <text x="50" y="322" fill="#3d3d5c" font-size="12">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
  <text x="50" y="342" fill="#89b4fa" font-size="12" font-weight="700">       PHASE 3-6: TESTING &amp; EXPLOITATION</text>
  <text x="50" y="362" fill="#3d3d5c" font-size="12">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <!-- Testing progress spinner -->
  <text x="50" y="386" fill="#89dceb" font-size="12">⡿</text>
  <text x="68" y="386" fill="#cdd6f4" font-size="12"> Testing</text>
  <text x="118" y="386" fill="#f5c2e7" font-size="12">/api/login</text>
  <text x="188" y="386" fill="#cdd6f4" font-size="12"> with 32 auth bypass payloads...</text>

  <!-- Finding 1: CRITICAL -->
  <text x="50" y="412" fill="#f38ba8" font-size="12" font-weight="700" filter="url(#glowRed)">═══ VULNERABILITY FOUND ═══</text>

  <rect x="50" y="422" width="930" height="72" rx="6" fill="#f38ba8" opacity="0.06"/>
  <rect x="50" y="422" width="4" height="72" rx="2" fill="#f38ba8"/>

  <text x="68" y="442" fill="#f38ba8" font-size="13" font-weight="700">CRITICAL</text>
  <text x="140" y="442" fill="#cdd6f4" font-size="13">Auth Bypass —</text>
  <text x="252" y="442" fill="#f9e2af" font-size="13">/api/login</text>
  <text x="344" y="442" fill="#cdd6f4" font-size="12">Score: 10/10 · Confidence: HIGH</text>

  <text x="68" y="462" fill="#a6adc8" font-size="11">Payload: {"username": {"$ne": ""}, "password": {"$ne": ""}}</text>
  <text x="68" y="478" fill="#a6adc8" font-size="11">Indicators: auth_success · sensitive_data · credential_leak · size_anomaly</text>
  <text x="68" y="494" fill="#a6adc8" font-size="11">Response: {"success": true, "token": "eyJhbGci...", "role": "admin", "flag": "flag{...}"}</text>

  <!-- Finding 2: HIGH -->
  <text x="50" y="520" fill="#fab387" font-size="12" font-weight="700">═══ VULNERABILITY FOUND ═══</text>

  <rect x="50" y="530" width="930" height="56" rx="6" fill="#fab387" opacity="0.05"/>
  <rect x="50" y="530" width="4" height="56" rx="2" fill="#fab387"/>

  <text x="68" y="550" fill="#fab387" font-size="13" font-weight="700">HIGH</text>
  <text x="118" y="550" fill="#cdd6f4" font-size="13">Query Injection —</text>
  <text x="240" y="550" fill="#f9e2af" font-size="13">/api/search</text>
  <text x="332" y="550" fill="#cdd6f4" font-size="12">Score: 8/10 · Confidence: HIGH</text>

  <text x="68" y="570" fill="#a6adc8" font-size="11">Payload: {"$gt": ""}  ·  Indicators: bulk_data · size_anomaly</text>
  <text x="68" y="586" fill="#a6adc8" font-size="11">Response: 47 records returned (baseline was 0) — data leak confirmed</text>

  <!-- Blinking cursor -->
  <rect x="50" y="650" width="10" height="16" rx="1" fill="#cdd6f4" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
  <text x="65" y="665" fill="#585b70" font-size="12">Scanning in progress — 3/14 endpoints tested · 2 vulnerabilities found · Press Ctrl+C to stop</text>

  <!-- Status bar at bottom -->
  <rect x="20" y="682" width="980" height="18" rx="0 0 12 12" fill="#1a1b2e" stroke="#3d3d5c" stroke-width="0.5"/>
  <rect x="20" y="682" width="980" height="18" rx="0 0 12 12" fill="#22c55e" opacity="0.05"/>
  <text x="40" y="695" fill="#585b70" font-size="9">● nosqlhunter scan · 14 endpoints · 2 vulns found · 6.4s elapsed</text>
  <text x="500" y="695" fill="#585b70" font-size="9">Python 3.11 · requests 2.31 · beautifulsoup4 4.12</text>
  <text x="880" y="695" fill="#585b70" font-size="9">INSECURE · 10 active threads</text>
</svg>
