<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660">
  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes scan { 0%{transform:translateY(0)} 100%{transform:translateY(620px)} }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
    @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.3} 94%{opacity:0.8} 96%{opacity:0.2} 97%{opacity:1} }
    @keyframes type1 { 0%{clip-path:inset(0 100% 0 0)} 100%{clip-path:inset(0 0 0 0)} }
    @keyframes rain { 0%{transform:translateY(-100%)} 100%{transform:translateY(660px)} }
    @keyframes glow { 0%,100%{filter:drop-shadow(0 0 4px #00ff41)} 50%{filter:drop-shadow(0 0 12px #00ff41)} }
    .cursor { animation: blink 1s step-end infinite }
    .scan { animation: scan 4s linear infinite }
    .pulse { animation: pulse 2s ease-in-out infinite }
    .flicker { animation: flicker 3s infinite }
    .type { white-space: nowrap; overflow: hidden; animation: type1 3s steps(60) forwards }
    .rain1 { animation: rain 8s linear infinite }
    .rain2 { animation: rain 11s linear infinite 2s }
    .rain3 { animation: rain 9s linear infinite 4s }
    .glow { animation: glow 2s ease-in-out infinite }
  </style>

  <rect width="1200" height="660" fill="#0a0e0a"/>

