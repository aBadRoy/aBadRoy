<svg width="820" height="580" viewBox="0 0 820 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root {
        --bg: #0d1117;
        --fg: #c9d1d9;
        --red: #ff4444;
        --green: #44cc44;
        --amber: #ffaa00;
        --dim: #636d83;
      }
      @keyframes fadeIn {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes typeOut {
        0%   { clip-path: inset(0 100% 0 0); }
        100% { clip-path: inset(0 0% 0 0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes scanMove {
        0%   { transform: translateY(0); }
        100% { transform: translateY(580px); }
      }
      @keyframes loadPulse {
        0%   { width: 30px; }
        50%  { width: 140px; }
        100% { width: 30px; }
      }
      @keyframes exfilPulse {
        0%   { width: 0; }
        50%  { width: 200px; }
        100% { width: 0; }
      }
      .fi  { opacity: 0; animation: fadeIn 0.35s both; }
      .ty  { clip-path: inset(0 100% 0 0); animation: typeOut 2s both; }
      .bl  { animation: blink 0.8s step-end infinite; }
      .sc  { animation: scanMove 6s linear infinite; }
      .lp  { animation: loadPulse 2.5s ease-in-out infinite; }
      .ep  { animation: exfilPulse 3s ease-in-out infinite; }
      .d25  { animation-delay: 2.5s; }
      .d35  { animation-delay: 3.5s; }
      .d45  { animation-delay: 4.5s; }
      .d80  { animation-delay: 8.0s; }
      .d85  { animation-delay: 8.5s; }
      .d90  { animation-delay: 9.0s; }
      .d12  { animation-delay: 12.5s; }
      .d13  { animation-delay: 13.0s; }
      .d16  { animation-delay: 16.5s; }
      .d17  { animation-delay: 17.0s; }
      .d20  { animation-delay: 20.5s; }
      .d21  { animation-delay: 21.0s; }
      .d22  { animation-delay: 22.0s; }
      .tp2 { animation-delay: 5.0s; }
      .tp3 { animation-delay: 9.5s; }
      .tp4 { animation-delay: 14.0s; }
      .tp5 { animation-delay: 18.0s; }
    </style>
  </defs>

  <rect width="820" height="580" fill="#050505"/>
  <rect x="10" y="10" width="800" height="560" rx="8" fill="var(--bg)" stroke="var(--red)" stroke-opacity="0.15" stroke-width="1.5"/>
  <rect x="10" y="10" width="800" height="32" rx="8" fill="var(--red)" fill-opacity="0.04"/>
  <rect x="10" y="26" width="800" height="16" fill="var(--bg)"/>
  <circle cx="36" cy="26" r="5" fill="#ff5555"/>
  <circle cx="56" cy="26" r="5" fill="#ffaa00"/>
  <circle cx="76" cy="26" r="5" fill="#00cc55"/>
  <text x="410" y="31" font-family="monospace" font-size="11" fill="var(--dim)" text-anchor="middle">aBadRoy@red-team: ~ — RED TEAM CONSOLE — TTY 0</text>
  <line x1="10" y1="42" x2="810" y2="42" stroke="var(--red)" stroke-opacity="0.08" stroke-width="0.5"/>
  <rect x="10" y="10" width="800" height="2" fill="var(--red)" fill-opacity="0.04" class="sc"/>

  <!-- Phase 1: initialize_operation -->
  <g font-family="monospace" font-size="13">
    <text x="30" y="70" fill="var(--red)" class="fi d00">root@aBadRoy:~#</text>
    <text x="180" y="70" fill="var(--fg)" class="ty tp1">initialize_operation --full-kill-chain</text>
  </g>

  <text x="30" y="94" font-family="monospace" font-size="13" class="fi d25">
    <tspan fill="var(--green)">[+]</tspan>
    <tspan fill="var(--fg)"> Loading modules...</tspan>
  </text>
  <rect x="190" y="88" width="140" height="8" rx="2" fill="var(--red)" fill-opacity="0.12" class="fi d25"/>
  <rect x="190" y="88" height="8" rx="2" fill="var(--green)" class="lp fi d25"/>

  <text x="30" y="118" font-family="monospace" font-size="13" class="fi d35">
    <tspan fill="var(--green)">[+]</tspan>
    <tspan fill="var(--fg)"> OPSEC: ENABLED — all channels encrypted</tspan>
  </text>

  <text x="30" y="142" font-family="monospace" font-size="13" class="fi d45">
    <tspan fill="var(--green)">[+]</tspan>
    <tspan fill="var(--fg)"> C2 link: </tspan>
    <tspan fill="var(--amber)">192.168.1.105:4444</tspan>
    <tspan fill="var(--fg)"> | RTT: 4ms | jitter: 15%</tspan>
  </text>

  <!-- Phase 2: recon -->
  <g font-family="monospace" font-size="13">
    <text x="30" y="175" fill="var(--red)" class="fi d55">root@aBadRoy:~#</text>
    <text x="180" y="175" fill="var(--fg)" class="ty tp2">recon --deep</text>
  </g>

  <text x="30" y="199" font-family="monospace" font-size="13" class="fi d80">
    <tspan fill="var(--green)">[✓]</tspan>
    <tspan fill="var(--fg)"> Subnet enumeration: 24 subnets / 1,247 hosts identified</tspan>
  </text>

  <text x="30" y="223" font-family="monospace" font-size="13" class="fi d85">
    <tspan fill="var(--green)">[✓]</tspan>
    <tspan fill="var(--fg)"> Credential harvesting: 142 password hashes captured</tspan>
  </text>

  <text x="30" y="247" font-family="monospace" font-size="13" class="fi d90">
    <tspan fill="var(--green)">[✓]</tspan>
    <tspan fill="var(--fg)"> Service fingerprinting: 47 open ports across 12 hosts</tspan>
  </text>

  <!-- Phase 3: exploit -->
  <g font-family="monospace" font-size="13">
    <text x="30" y="280" fill="var(--red)" class="fi d10">root@aBadRoy:~#</text>
    <text x="180" y="280" fill="var(--fg)" class="ty tp3">exploit --vector LFI --target 10.10.20.100</text>
  </g>

  <text x="30" y="304" font-family="monospace" font-size="13" class="fi d12">
    <tspan fill="var(--green)">[✓]</tspan>
    <tspan fill="var(--fg)"> CVE-2024-XXXX — WordPress LFI via /wp-content/..</tspan>
  </text>

  <text x="30" y="328" font-family="monospace" font-size="13" class="fi d13">
    <tspan fill="var(--green)">[✓]</tspan>
    <tspan fill="var(--fg)"> Remote shell: </tspan>
    <tspan fill="var(--amber)">www-data@10.10.20.100:443</tspan>
    <tspan fill="var(--fg)"> — beacon B-03 deployed</tspan>
  </text>

  <!-- Phase 4: privesc -->
  <g font-family="monospace" font-size="13">
    <text x="30" y="361" fill="var(--red)" class="fi d14">root@aBadRoy:~#</text>
    <text x="180" y="361" fill="var(--fg)" class="ty tp4">privesc</text>
  </g>

  <text x="30" y="385" font-family="monospace" font-size="13" class="fi d16">
    <tspan fill="var(--green)">[✓]</tspan>
    <tspan fill="var(--fg)"> SUID vector: /usr/bin/pkexec (CVE-2021-4034) — vulnerable</tspan>
  </text>

  <text x="30" y="409" font-family="monospace" font-size="13" class="fi d17">
    <tspan fill="var(--green)">[✓]</tspan>
    <tspan fill="var(--fg)"> ROOT: 10.10.20.100 — full administrative access obtained</tspan>
  </text>

  <!-- Phase 5: exfil -->
  <g font-family="monospace" font-size="13">
    <text x="30" y="442" fill="var(--red)" class="fi d18">root@aBadRoy:~#</text>
    <text x="180" y="442" fill="var(--fg)" class="ty tp5">exfil --target DC01</text>
  </g>

  <text x="30" y="466" font-family="monospace" font-size="13" class="fi d20">
    <tspan fill="var(--green)">[✓]</tspan>
    <tspan fill="var(--fg)"> Tunnel: AES-256 encrypted — endpoint: 192.168.1.105:8443</tspan>
  </text>

  <text x="30" y="490" font-family="monospace" font-size="13" class="fi d21">
    <tspan fill="var(--amber)">[→]</tspan>
    <tspan fill="var(--fg)"> Exfiltrating 2.4 GB of sensitive data</tspan>
  </text>
  <rect x="280" y="484" width="200" height="8" rx="2" fill="var(--red)" fill-opacity="0.12" class="fi d21"/>
  <rect x="280" y="484" height="8" rx="2" fill="var(--amber)" class="ep fi d21"/>

  <text x="30" y="530" font-family="monospace" font-size="13" fill="var(--red)" class="fi d22">root@aBadRoy:~#</text>
  <rect x="180" y="518" width="9" height="16" fill="var(--red)" class="fi d22 bl"/>
</svg>
