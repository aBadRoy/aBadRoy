<svg width="660" height="200" viewBox="0 0 660 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a0000"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#ff0000;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="660" height="200" fill="url(#bg-grad)" rx="6"/>
  <!-- Header bar -->
  <rect width="660" height="30" fill="url(#header-grad)"/>
  <rect x="0" y="28" width="660" height="2" fill="#ff0000" opacity="0.3"/>
  <!-- Title bar dots -->
  <circle cx="16" cy="15" r="4" fill="#ff3333"/>
  <circle cx="30" cy="15" r="4" fill="#ff6633"/>
  <circle cx="44" cy="15" r="4" fill="#33cc33"/>
  <text x="60" y="20" fill="#8b949e" font-family="monospace" font-size="11">aBadRoy@red-team:~$</text>
  <text x="210" y="20" fill="#c9d1d9" font-family="monospace" font-size="11">/home/operator/profiles/README.md</text>
  <!-- Line 1: Matrix rain style -->
  <text x="25" y="60" fill="#ff0000" font-family="monospace" font-size="13" font-weight="bold">root@red-team:~#</text>
  <text x="165" y="60" fill="#c9d1d9" font-family="monospace" font-size="13">init —setup red_team_operator —profile aBadRoy</text>
  <!-- Line 2 -->
  <text x="25" y="85" fill="#44cc44" font-family="monospace" font-size="12"> [OK]</text>
  <text x="65" y="85" fill="#c9d1d9" font-family="monospace" font-size="12">Loading operator profile…</text>
  <!-- Line 3 -->
  <text x="25" y="108" fill="#44cc44" font-family="monospace" font-size="12"> [OK]</text>
  <text x="65" y="108" fill="#c9d1d9" font-family="monospace" font-size="12">C2 beacon established — 192.168.1.105:4444</text>
  <!-- Line 4 -->
  <text x="25" y="131" fill="#44cc44" font-family="monospace" font-size="12"> [OK]</text>
  <text x="65" y="131" fill="#c9d1d9" font-family="monospace" font-size="12">Payload arsenal loaded — 1,247 warheads ready</text>
  <!-- Line 5 -->
  <text x="25" y="154" fill="#44cc44" font-family="monospace" font-size="12"> [OK]</text>
  <text x="65" y="154" fill="#c9d1d9" font-family="monospace" font-size="12">MITRE ATT&CK framework synchronized — v14.1</text>
  <!-- Separator -->
  <rect x="25" y="165" width="610" height="1" fill="#ff0000" opacity="0.2"/>
  <!-- Line 6: prompt -->
  <text x="25" y="185" fill="#ff0000" font-family="monospace" font-size="13" font-weight="bold">root@red-team:~#</text>
  <text x="165" y="185" fill="#c9d1d9" font-family="monospace" font-size="13">cat /etc/operator/motto</text>
  <!-- Cursor -->
  <rect x="335" y="172" width="10" height="14" fill="#ff0000"/>
  <!-- Motto quote -->
  <text x="25" y="220" fill="#ff4444" font-family="monospace" font-size="11">"Access is the only law. Everything else is just a firewall."</text>
  <!-- Bottom glow line -->
  <rect x="0" y="238" width="660" height="2" fill="#ff0000" opacity="0.15"/>
</svg>
