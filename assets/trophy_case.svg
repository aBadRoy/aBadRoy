<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#ff8800"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="50%" style="stop-color:#c0c0c0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd7f32"/>
      <stop offset="50%" style="stop-color:#b8722d"/>
      <stop offset="100%" style="stop-color:#a06020"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="1000" height="280" rx="8" fill="url(#bg)" stroke="#ff000033" stroke-width="1"/>
  
  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" fill="#ff0000" font-size="18" font-weight="900" letter-spacing="6" filter="url(#glow)">🏆 ACHIEVEMENTS UNLOCKED</text>
  <line x1="200" y1="52" x2="800" y2="52" stroke="#ff0000" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Trophy 1 -->
  <g transform="translate(60, 75)" filter="url(#shadow)">
    <path d="M50,10 L40,10 L35,40 L65,40 L60,10 Z" fill="url(#gold)" opacity="0.9"/>
    <circle cx="50" cy="25" r="8" fill="#1a0a0a"/>
    <rect x="42" y="40" width="16" height="5" rx="2" fill="url(#gold)"/>
    <rect x="38" y="45" width="24" height="3" rx="1" fill="url(#gold)"/>
    <rect x="45" y="48" width="10" height="10" rx="1" fill="url(#gold)"/>
    <text x="50" y="75" text-anchor="middle" fill="#ffd700" font-size="11" font-weight="700">STARGAZER</text>
    <text x="50" y="92" text-anchor="middle" fill="#ff6666" font-size="13" font-weight="900">★ ★ ★ ★ ★</text>
  </g>
  
  <!-- Trophy 2 -->
  <g transform="translate(210, 75)" filter="url(#shadow)">
    <path d="M50,10 L40,10 L35,40 L65,40 L60,10 Z" fill="url(#silver)" opacity="0.9"/>
    <circle cx="50" cy="25" r="8" fill="#1a0a0a"/>
    <rect x="42" y="40" width="16" height="5" rx="2" fill="url(#silver)"/>
    <rect x="38" y="45" width="24" height="3" rx="1" fill="url(#silver)"/>
    <rect x="45" y="48" width="10" height="10" rx="1" fill="url(#silver)"/>
    <text x="50" y="75" text-anchor="middle" fill="#c0c0c0" font-size="11" font-weight="700">CONTRIBUTOR</text>
    <text x="50" y="92" text-anchor="middle" fill="#ff6666" font-size="13" font-weight="900">★ ★ ★ ★ ☆</text>
  </g>
  
  <!-- Trophy 3 -->
  <g transform="translate(360, 75)" filter="url(#shadow)">
    <path d="M50,10 L40,10 L35,40 L65,40 L60,10 Z" fill="url(#bronze)" opacity="0.9"/>
    <circle cx="50" cy="25" r="8" fill="#1a0a0a"/>
    <rect x="42" y="40" width="16" height="5" rx="2" fill="url(#bronze)"/>
    <rect x="38" y="45" width="24" height="3" rx="1" fill="url(#bronze)"/>
    <rect x="45" y="48" width="10" height="10" rx="1" fill="url(#bronze)"/>
    <text x="50" y="75" text-anchor="middle" fill="#cd7f32" font-size="11" font-weight="700">HUNTER</text>
    <text x="50" y="92" text-anchor="middle" fill="#ff6666" font-size="13" font-weight="900">★ ★ ★ ★ ☆</text>
  </g>
  
  <!-- Trophy 4 -->
  <g transform="translate(510, 75)" filter="url(#shadow)">
    <path d="M50,10 L40,10 L35,40 L65,40 L60,10 Z" fill="#ff4444" opacity="0.9"/>
    <circle cx="50" cy="25" r="8" fill="#1a0a0a"/>
    <rect x="42" y="40" width="16" height="5" rx="2" fill="#ff4444"/>
    <rect x="38" y="45" width="24" height="3" rx="1" fill="#ff4444"/>
    <rect x="45" y="48" width="10" height="10" rx="1" fill="#ff4444"/>
    <text x="50" y="75" text-anchor="middle" fill="#ff6666" font-size="11" font-weight="700">EXPLOITER</text>
    <text x="50" y="92" text-anchor="middle" fill="#ff6666" font-size="13" font-weight="900">★ ★ ★ ★ ☆</text>
  </g>
  
  <!-- Trophy 5 -->
  <g transform="translate(660, 75)" filter="url(#shadow)">
    <path d="M50,10 L40,10 L35,40 L65,40 L60,10 Z" fill="#00ff88" opacity="0.9"/>
    <circle cx="50" cy="25" r="8" fill="#1a0a0a"/>
    <rect x="42" y="40" width="16" height="5" rx="2" fill="#00ff88"/>
    <rect x="38" y="45" width="24" height="3" rx="1" fill="#00ff88"/>
    <rect x="45" y="48" width="10" height="10" rx="1" fill="#00ff88"/>
    <text x="50" y="75" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="700">C2 OPERATOR</text>
    <text x="50" y="92" text-anchor="middle" fill="#ff6666" font-size="13" font-weight="900">★ ★ ★ ☆ ☆</text>
  </g>
  
  <!-- Trophy 6 -->
  <g transform="translate(810, 75)" filter="url(#shadow)">
    <path d="M50,10 L40,10 L35,40 L65,40 L60,10 Z" fill="#ff00ff" opacity="0.9"/>
    <circle cx="50" cy="25" r="8" fill="#1a0a0a"/>
    <rect x="42" y="40" width="16" height="5" rx="2" fill="#ff00ff"/>
    <rect x="38" y="45" width="24" height="3" rx="1" fill="#ff00ff"/>
    <rect x="45" y="48" width="10" height="10" rx="1" fill="#ff00ff"/>
    <text x="50" y="75" text-anchor="middle" fill="#ff00ff" font-size="11" font-weight="700">CTF SOLVER</text>
    <text x="50" y="92" text-anchor="middle" fill="#ff6666" font-size="13" font-weight="900">★ ★ ★ ☆ ☆</text>
  </g>

  <!-- Stats Row -->
  <rect x="50" y="180" width="900" height="85" rx="6" fill="#0d0000" stroke="#ff000033" stroke-width="0.5"/>
  
  <text x="110" y="210" text-anchor="middle" fill="#660000" font-size="9" font-weight="700">TOTAL STARS</text>
  <text x="110" y="240" text-anchor="middle" fill="#ffd700" font-size="22" font-weight="900">★</text>
  
  <line x1="170" y1="190" x2="170" y2="255" stroke="#ff000033" stroke-width="0.5"/>
  
  <text x="215" y="210" text-anchor="middle" fill="#660000" font-size="9" font-weight="700">REPOSITORIES</text>
  <text x="215" y="240" text-anchor="middle" fill="#ff6666" font-size="22" font-weight="900">10</text>
  
  <line x1="280" y1="190" x2="280" y2="255" stroke="#ff000033" stroke-width="0.5"/>
  
  <text x="330" y="210" text-anchor="middle" fill="#660000" font-size="9" font-weight="700">TOOLS BUILT</text>
  <text x="330" y="240" text-anchor="middle" fill="#ff6666" font-size="22" font-weight="900">9</text>
  
  <line x1="400" y1="190" x2="400" y2="255" stroke="#ff000033" stroke-width="0.5"/>
  
  <text x="455" y="210" text-anchor="middle" fill="#660000" font-size="9" font-weight="700">PAYLOADS</text>
  <text x="455" y="240" text-anchor="middle" fill="#ff6666" font-size="22" font-weight="900">6,432</text>
  
  <line x1="520" y1="190" x2="520" y2="255" stroke="#ff000033" stroke-width="0.5"/>
  
  <text x="575" y="210" text-anchor="middle" fill="#660000" font-size="9" font-weight="700">VULNS FOUND</text>
  <text x="575" y="240" text-anchor="middle" fill="#ff6666" font-size="22" font-weight="900">100+</text>
  
  <line x1="640" y1="190" x2="640" y2="255" stroke="#ff000033" stroke-width="0.5"/>
  
  <text x="695" y="210" text-anchor="middle" fill="#660000" font-size="9" font-weight="700">CTFS SOLVED</text>
  <text x="695" y="240" text-anchor="middle" fill="#ff6666" font-size="22" font-weight="900">15</text>
  
  <line x1="760" y1="190" x2="760" y2="255" stroke="#ff000033" stroke-width="0.5"/>
  
  <text x="825" y="210" text-anchor="middle" fill="#660000" font-size="9" font-weight="700">C2 FRAMEWORKS</text>
  <text x="825" y="240" text-anchor="middle" fill="#ff6666" font-size="22" font-weight="900">6</text>
  
  <line x1="890" y1="190" x2="890" y2="255" stroke="#ff000033" stroke-width="0.5"/>
  
  <text x="935" y="210" text-anchor="middle" fill="#660000" font-size="9" font-weight="700">EXPLOIT CATS</text>
  <text x="935" y="240" text-anchor="middle" fill="#ff6666" font-size="22" font-weight="900">12</text>
</svg>
