<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660">
  <defs>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff41" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff0044"/>
      <stop offset="100%" stop-color="#ff004488"/>
    </linearGradient>
    <linearGradient id="barCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#00ffff88"/>
    </linearGradient>
    <linearGradient id="barMagenta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#ff00ff88"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes blinkFast { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes scan { 0%{transform:translateY(0)} 100%{transform:translateY(660px)} }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
    @keyframes pulseSoft { 0%,100%{opacity:0.5} 50%{opacity:0.9} }
    @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.2} 94%{opacity:0.7} 96%{opacity:0.1} 97%{opacity:1} }
    @keyframes glitch1 { 0%,100%{transform:translate(0)} 95%{transform:translate(0)} 96%{transform:translate(-3px,2px)} 97%{transform:translate(3px,-1px)} 98%{transform:translate(-2px,1px)} }
    @keyframes glitch2 { 0%,100%{transform:translate(0)} 95%{transform:translate(0)} 96%{transform:translate(3px,-2px)} 97%{transform:translate(-3px,1px)} 98%{transform:translate(2px,-1px)} }
    @keyframes rain { 0%{transform:translateY(-100%);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateY(660px);opacity:0} }
    @keyframes rainDim { 0%{transform:translateY(-100%);opacity:0} 10%{opacity:0.3} 90%{opacity:0.3} 100%{transform:translateY(660px);opacity:0} }
    @keyframes glow { 0%,100%{filter:drop-shadow(0 0 4px #00ff41)} 50%{filter:drop-shadow(0 0 16px #00ff41)drop-shadow(0 0 30px #00ff4166)} }
    @keyframes glowRed { 0%,100%{filter:drop-shadow(0 0 3px #ff0044)} 50%{filter:drop-shadow(0 0 12px #ff0044)drop-shadow(0 0 24px #ff004466)} }
    @keyframes barGrow { 0%{width:0} 100%{width:var(--w)} }
    @keyframes dotPulse { 0%,100%{r:3;opacity:0.4} 50%{r:5;opacity:1} }
    @keyframes dashMove { 0%{stroke-dashoffset:24} 100%{stroke-dashoffset:0} }
    @keyframes hueShift { 0%,100%{filter:hue-rotate(0deg)} 50%{filter:hue-rotate(10deg)} }
    @keyframes vcr { 0%,100%{transform:translateY(0)} 10%{transform:translateY(-60px)} 12%{transform:translateY(0)} 45%{transform:translateY(0)} 46%{transform:translateY(40px)} 48%{transform:translateY(0)} }
    @keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
    @keyframes noise { 0%,100%{opacity:0.02} 50%{opacity:0.06} }

    .cursor { animation: blink 1s step-end infinite }
    .cursor-fast { animation: blinkFast 0.5s step-end infinite }
    .scan { animation: scan 3s linear infinite }
    .pulse { animation: pulse 2s ease-in-out infinite }
    .pulse-soft { animation: pulseSoft 3s ease-in-out infinite }
    .flicker { animation: flicker 4s infinite }
    .glitch-a { animation: glitch1 5s infinite }
    .glitch-b { animation: glitch2 5s infinite }
    .glow { animation: glow 2s ease-in-out infinite }
    .glow-red { animation: glowRed 1.5s ease-in-out infinite }
    .hue { animation: hueShift 4s ease-in-out infinite }
    .vcr { animation: vcr 12s infinite }
    .spin { animation: spin 2s linear infinite; transform-origin: center }
    .noise { animation: noise 0.5s infinite }
    .dash { stroke-dasharray: 8 4; animation: dashMove 1s linear infinite }

    .bar-a { animation: barGrow 2s ease-out 0.5s forwards; width:0 }
    .bar-b { animation: barGrow 2s ease-out 1s forwards; width:0 }
    .bar-c { animation: barGrow 2s ease-out 1.5s forwards; width:0 }
    .bar-d { animation: barGrow 2s ease-out 2s forwards; width:0 }
  </style>

