<svg width="960" height="400" viewBox="0 0 960 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="pulse-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0000" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="header-grad" x1="0" y1="0" x2="960" y2="0">
      <stop offset="0%" stop-color="#ff0000" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#ff0000" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="400" fill="#0d1117"/>
  <rect width="960" height="40" fill="url(#header-grad)"/>

  <!-- Grid lines -->
  <line x1="0" y1="40" x2="960" y2="40" stroke="#ff0000" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="0" y1="100" x2="960" y2="100" stroke="#ff0000" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="160" x2="960" y2="160" stroke="#ff0000" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="220" x2="960" y2="220" stroke="#ff0000" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="280" x2="960" y2="280" stroke="#ff0000" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="340" x2="960" y2="340" stroke="#ff0000" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Scanline overlay -->
  <rect x="0" y="0" width="960" height="6" fill="#ff0000" fill-opacity="0.08">
    <animate attributeName="y" from="0" to="400" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Header dots -->
  <circle cx="20" cy="20" r="4" fill="#ff3333"/>
  <circle cx="34" cy="20" r="4" fill="#ff6633"/>
  <circle cx="48" cy="20" r="4" fill="#33cc33"/>

  <!-- Header title -->
  <text x="62" y="25" font-family="monospace" font-size="12" fill="#8b949e">aBadRoy@red-team:~$</text>
  <text x="200" y="25" font-family="monospace" font-size="12" fill="#c9d1d9">/home/operator/red-team-console</text>

  <!-- Main Title with glow -->
  <text x="30" y="78" font-family="monospace" font-size="28" fill="#ff0000" font-weight="bold" filter="url(#glow)">
    RED TEAM OPERATOR
    <animate attributeName="opacity" values="1;0.7;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Status badge -->
  <rect x="350" y="58" width="120" height="22" rx="11" fill="none" stroke="#ff0000" stroke-opacity="0.5"/>
  <circle cx="368" cy="69" r="4" fill="#00ff00">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="380" y="73" font-family="monospace" font-size="11" fill="#ff0000">MISSION ACTIVE</text>

  <!-- Terminal line -->
  <text x="30" y="115" font-family="monospace" font-size="14" fill="#ff4444">root@aBadRoy:~#</text>
  <text x="180" y="115" font-family="monospace" font-size="14" fill="#c9d1d9">cat /etc/red-team/status</text>
  <rect x="430" y="101" width="8" height="15" fill="#ff0000">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Status line -->
  <text x="30" y="140" font-family="monospace" font-size="12" fill="#44cc44">[✓]</text>
  <text x="55" y="140" font-family="monospace" font-size="12" fill="#c9d1d9">C2 beacon established — 192.168.1.105:4444</text>
  <text x="30" y="158" font-family="monospace" font-size="12" fill="#44cc44">[✓]</text>
  <text x="55" y="158" font-family="monospace" font-size="12" fill="#c9d1d9">Payload arsenal loaded — 1,247 warheads ready</text>
  <text x="30" y="176" font-family="monospace" font-size="12" fill="#44cc44">[✓]</text>
  <text x="55" y="176" font-family="monospace" font-size="12" fill="#c9d1d9">MITRE ATT&amp;CK framework synchronized — v14.1</text>
  <text x="30" y="194" font-family="monospace" font-size="12" fill="#44cc44">[✓]</text>
  <text x="55" y="194" font-family="monospace" font-size="12" fill="#c9d1d9">Opsec channels encrypted — 3 active tunnels</text>

  <!-- Divider -->
  <line x1="30" y1="208" x2="930" y2="208" stroke="#ff0000" stroke-opacity="0.12" stroke-width="1"/>

  <!-- === NETWORK MAP === -->
  <text x="30" y="235" font-family="monospace" font-size="13" fill="#ff0000" font-weight="bold">
    ▼ NETWORK TOPOLOGY
  </text>

  <!-- Network node connections -->
  <line x1="500" y1="250" x2="620" y2="300" stroke="#ff0000" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="620" y1="300" x2="750" y2="270" stroke="#ff0000" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="500" y1="250" x2="700" y2="360" stroke="#ff0000" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="620" y1="300" x2="700" y2="360" stroke="#ff0000" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="750" y1="270" x2="860" y2="320" stroke="#ff0000" stroke-opacity="0.25" stroke-width="1"/>
  <line x1="700" y1="360" x2="860" y2="320" stroke="#ff0000" stroke-opacity="0.2" stroke-width="1"/>

  <!-- C2 Node (center hub) -->
  <circle cx="500" cy="250" r="18" fill="url(#pulse-grad)" stroke="none"/>
  <circle cx="500" cy="250" r="8" fill="#ff0000" stroke="#ff4444" stroke-width="2">
    <animate attributeName="r" values="7;10;7" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="500" y="295" font-family="monospace" font-size="10" fill="#ff4444" text-anchor="middle">C2</text>
  <text x="500" y="305" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">:4444</text>

  <!-- Beacon Node 1 -->
  <circle cx="620" cy="300" r="10" fill="#ff0000" fill-opacity="0.1"/>
  <circle cx="620" cy="300" r="5" fill="#ff0000" stroke="#ff4444" stroke-width="1.5">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="620" y="325" font-family="monospace" font-size="10" fill="#c9d1d9" text-anchor="middle">beacon-01</text>
  <text x="620" y="335" font-family="monospace" font-size="8" fill="#44cc44" text-anchor="middle">active</text>

  <!-- Beacon Node 2 -->
  <circle cx="750" cy="270" r="10" fill="#ff0000" fill-opacity="0.1"/>
  <circle cx="750" cy="270" r="5" fill="#ff0000" stroke="#ff4444" stroke-width="1.5">
    <animate attributeName="r" values="5;3;5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="750" y="295" font-family="monospace" font-size="10" fill="#c9d1d9" text-anchor="middle">beacon-02</text>
  <text x="750" y="305" font-family="monospace" font-size="8" fill="#44cc44" text-anchor="middle">active</text>

  <!-- Beacon Node 3 -->
  <circle cx="700" cy="360" r="10" fill="#ff0000" fill-opacity="0.1"/>
  <circle cx="700" cy="360" r="5" fill="#ff0000" stroke="#ff4444" stroke-width="1.5">
    <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
