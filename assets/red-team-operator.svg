  <text x="700" y="383" font-family="monospace" font-size="10" fill="#c9d1d9" text-anchor="middle">beacon-03</text>
  <text x="700" y="393" font-family="monospace" font-size="8" fill="#ff6644" text-anchor="middle">sleep(60)</text>

  <!-- Target Node -->
  <circle cx="860" cy="320" r="12" fill="#ff0000" fill-opacity="0.08"/>
  <circle cx="860" cy="320" r="6" fill="#ff4444" stroke="#ff6666" stroke-width="2">
    <animate attributeName="r" values="5;7;5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="860" y="345" font-family="monospace" font-size="10" fill="#ff4444" text-anchor="middle">target</text>
  <text x="860" y="355" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">10.10.10.0/24</text>

  <!-- Animated attack packet moving from C2 to beacon-01 -->
  <circle r="3" fill="#ffffff">
    <animateMotion dur="3s" repeatCount="indefinite" path="M500 250 L620 300"/>
  </circle>

  <!-- Animated attack packet moving from beacon-01 to target -->
  <circle r="3" fill="#ffffff">
    <animateMotion dur="4s" repeatCount="indefinite" path="M620 300 L860 320"/>
  </circle>

  <!-- Exfil packet moving from target back to C2 via beacon-02 -->
  <circle r="2.5" fill="#ff6666">
    <animateMotion dur="5s" repeatCount="indefinite" path="M860 320 L750 270 L500 250"/>
  </circle>

  <!-- === STATS PANEL === -->
  <text x="30" y="235" font-family="monospace" font-size="13" fill="#ff0000" font-weight="bold">
    ▼ NETWORK TOPOLOGY
  </text>

  <rect x="30" y="245" width="440" height="130" rx="4" fill="none" stroke="#ff0000" stroke-opacity="0.1" stroke-width="1"/>

  <text x="45" y="265" font-family="monospace" font-size="11" fill="#8b949e">SESSION TABLE</text>
  <line x1="45" y1="270" x2="455" y2="270" stroke="#ff0000" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Table header -->
  <text x="45" y="288" font-family="monospace" font-size="10" fill="#ff4444">ID</text>
  <text x="80" y="288" font-family="monospace" font-size="10" fill="#ff4444">HOST</text>
  <text x="200" y="288" font-family="monospace" font-size="10" fill="#ff4444">USER</text>
  <text x="290" y="288" font-family="monospace" font-size="10" fill="#ff4444">PLATFORM</text>
  <text x="370" y="288" font-family="monospace" font-size="10" fill="#ff4444">STATUS</text>

  <!-- Row 1 -->
  <text x="45" y="308" font-family="monospace" font-size="10" fill="#c9d1d9">01</text>
  <text x="80" y="308" font-family="monospace" font-size="10" fill="#c9d1d9">192.168.1.105</text>
  <text x="200" y="308" font-family="monospace" font-size="10" fill="#c9d1d9">root</text>
  <text x="290" y="308" font-family="monospace" font-size="10" fill="#c9d1d9">linux</text>
  <circle cx="380" cy="305" r="3" fill="#00ff00">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="390" y="308" font-family="monospace" font-size="10" fill="#44cc44">active</text>

  <!-- Row 2 -->
  <text x="45" y="325" font-family="monospace" font-size="10" fill="#c9d1d9">02</text>
  <text x="80" y="325" font-family="monospace" font-size="10" fill="#c9d1d9">10.10.10.50</text>
  <text x="200" y="325" font-family="monospace" font-size="10" fill="#c9d1d9">admin</text>
  <text x="290" y="325" font-family="monospace" font-size="10" fill="#c9d1d9">windows</text>
  <circle cx="380" cy="322" r="3" fill="#00ff00">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="390" y="325" font-family="monospace" font-size="10" fill="#44cc44">active</text>

  <!-- Row 3 -->
  <text x="45" y="342" font-family="monospace" font-size="10" fill="#c9d1d9">03</text>
  <text x="80" y="342" font-family="monospace" font-size="10" fill="#c9d1d9">10.10.20.100</text>
  <text x="200" y="342" font-family="monospace" font-size="10" fill="#c9d1d9">www-data</text>
  <text x="290" y="342" font-family="monospace" font-size="10" fill="#c9d1d9">linux</text>
  <circle cx="380" cy="339" r="3" fill="#ffaa00"/>
  <text x="390" y="342" font-family="monospace" font-size="10" fill="#ffaa00">sleep(60)</text>

  <!-- Row 4 -->
  <text x="45" y="359" font-family="monospace" font-size="10" fill="#c9d1d9">04</text>
  <text x="80" y="359" font-family="monospace" font-size="10" fill="#c9d1d9">10.10.30.200</text>
  <text x="200" y="359" font-family="monospace" font-size="10" fill="#c9d1d9">svc-sql</text>
  <text x="290" y="359" font-family="monospace" font-size="10" fill="#c9d1d9">windows</text>
  <circle cx="380" cy="356" r="3" fill="#ff4444"/>
  <text x="390" y="359" font-family="monospace" font-size="10" fill="#ff4444">dormant</text>

  <!-- Stats box -->
  <rect x="500" y="245" width="430" height="130" rx="4" fill="none" stroke="#ff0000" stroke-opacity="0.1" stroke-width="1"/>

  <text x="515" y="265" font-family="monospace" font-size="11" fill="#8b949e">MISSION METRICS</text>
  <line x1="515" y1="270" x2="915" y2="270" stroke="#ff0000" stroke-opacity="0.08" stroke-width="1"/>

  <text x="515" y="292" font-family="monospace" font-size="11" fill="#ff4444">OPERATION:</text>
  <text x="600" y="292" font-family="monospace" font-size="11" fill="#c9d1d9">Adversary Emulation</text>

  <text x="515" y="312" font-family="monospace" font-size="11" fill="#ff4444">TASKS:</text>
  <text x="600" y="312" font-family="monospace" font-size="11" fill="#c9d1d9">12 queued  |  8 completed</text>

  <text x="515" y="332" font-family="monospace" font-size="11" fill="#ff4444">CREDS:</text>
  <text x="600" y="332" font-family="monospace" font-size="11" fill="#c9d1d9">142 hashes  |  89 cracked (62%)</text>

  <text x="515" y="352" font-family="monospace" font-size="11" fill="#ff4444">EXFIL:</text>
  <text x="600" y="352" font-family="monospace" font-size="11" fill="#c9d1d9">2.4 GB encrypted  |  tunnel active</text>

  <text x="515" y="372" font-family="monospace" font-size="11" fill="#ff4444">OPSEC:</text>
  <text x="600" y="372" font-family="monospace" font-size="11" fill="#44cc44">ENABLED  |  uptime: 72h</text>

  <!-- Bottom glow line -->
  <rect x="0" y="395" width="960" height="5" fill="#ff0000" fill-opacity="0.08"/>
</svg>
